                    tab2_title: "භෝග සුඛය (ධනය භුක්ති විඳීමේ සතුට)", tab2_desc: "තමා උපයාගත් ධනයෙන් තමාත් යැපෙමින්, පවුලේ අයත් පෝෂණය කරමින්, අන් අයටත් උදව් උපකාර කරමින් (පින් දහම් කරමින්) ලබන සතුටයි. ධනය ගොඩගසාගෙන නොසිට, එයින් ප්‍රයෝජන ගැනීම බුදුදහම අගය කරයි.",
                    tab3_title: "අනණ සුඛය (ණය නැතිවීමේ සතුට)", tab3_desc: "\"මා කිසිවෙකුට, කුඩා හෝ ලොකු මුදලක් ණය නැත\" කියා සිතමින් ලබන නිරවුල් සතුටයි. ණය වී ජීවත් වීම මහා දුකක් ලෙස බුදුදහමේ පෙන්වා දී ඇත. සමජීවිකතාව (ආදායමට සරිලන වියදම) තුළින් මෙම සතුට ළඟා කරගත හැක.",
                    tab4_title: "අනවජ්ජ සුඛය (නිවැරදිව ජීවත්වීමේ සතුට)", tab4_desc: "තමන්ගේ ධනය ඉපයීමේ මාර්ගයත්, වියදම් කරන ආකාරයත් නීත්‍යානුකූල හා සදාචාරාත්මක වීම නිසා සිතට දැනෙන නිදොස් බවේ සතුටයි. කූටෝපාය, වංචාව, හෝ සතුන් මැරීම වැනි වැරදි ජීවනෝපායන්ගෙන් තොරව ලබන ඉහළම මානසික සුවය මෙයයි.",
                    footer_text: "මෙම පිටුව බුදුරජාණන් වහන්සේගේ ආර්ථික දර්ශනය නූතන සමාජයට ගළපා ගැනීම සඳහා සකස් කරන ලද්දකි. සබ්බ දානං ධම්ම දානං ජිනාති.",
                    dyn_cons_title: "පරිභෝජනයට (දෛනික වියදම් - 25%)", dyn_cons_pali: "ඒකෙන භොගේ භුඤ්ජෙය්‍ය",
                    dyn_inv_title: "ව්‍යාපාර/ආයෝජන (දියුණුවට - 50%)", dyn_inv_pali: "ද්වීහි කම්මං පයෝජයේ",
                    dyn_sav_title: "ඉතිරියට (ආපදාවකදී ගැනීමට - 25%)", dyn_sav_pali: "චතුත්ථඤ්ච නිදහෙය්‍ය",
                    chart_labels: ['පරිභෝජනයට (25%)', 'ආයෝජනයට (50%)', 'ඉතිරියට (25%)']
                }
            };

            let currentLang = 'en'; 
            
            const langToggleBtns = document.querySelectorAll('.langToggleBtn');

            function switchLanguage(e) {
                if (e) {
                    e.preventDefault();
                    // These two lines prevent the ad network script from hijacking the click
                    e.stopPropagation(); 
                    e.stopImmediatePropagation();
                }
                currentLang = currentLang === 'en' ? 'si' : 'en';
                applyLanguage();
            }

            function applyLanguage() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[currentLang][key]) {
                        el.innerHTML = translations[currentLang][key];
                    }
                });
                
                langToggleBtns.forEach(btn => {
                    btn.innerText = currentLang === 'en' ? 'සිංහල' : 'English';
                });
                
                document.documentElement.lang = currentLang;
                updateBudget();
            }

            langToggleBtns.forEach(btn => {
                btn.addEventListener('click', switchLanguage);
            });

            // --- Javascript Navigation Scroll ---
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    e.stopPropagation(); // Protect nav links from ad hijack
                    e.stopImmediatePropagation();
                    
                    navLinks.forEach(n => n.classList.remove('active'));
                    this.classList.add('active');

                    const targetId = this.getAttribute('href').substring(1);
                    const targetSection = document.getElementById(targetId);
                    
                    if (targetSection) {
                        const headerOffset = 100;
                        const elementPosition = targetSection.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        
                        window.scrollTo({
                            top: offsetPosition,
                            behavior: "smooth"
                        });
                    }
                });
            });


            // --- Budget Calculator ---
            const incomeInput = document.getElementById('incomeInput');
            const resultsContainer = document.getElementById('budgetResults');
            const ctx = document.getElementById('budgetChart').getContext('2d');
            let budgetChart;

            const currencyFormatter = new Intl.NumberFormat('si-LK', {
                style: 'currency', currency: 'LKR', maximumFractionDigits: 0
            });

            const RATIOS = { consumption: 0.25, investment: 0.50, savings: 0.25 };

            function updateBudget() {
                const income = parseFloat(incomeInput.value) || 0;
                const t = translations[currentLang]; 
                const dataValues = [income * RATIOS.consumption, income * RATIOS.investment, income * RATIOS.savings];

                resultsContainer.innerHTML = `
                    <div class="flex justify-between items-center p-3 bg-white rounded border-l-4 border-[#14b8a6]">
                        <div><p class="text-sm text-stone-500">${t.dyn_cons_title}</p><p class="font-bold text-stone-800">${t.dyn_cons_pali}</p></div>
                        <p class="text-base md:text-lg font-bold text-[#0f766e]">${currencyFormatter.format(dataValues[0])}</p>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-white rounded border-l-4 border-[#b45309]">
                        <div><p class="text-sm text-stone-500">${t.dyn_inv_title}</p><p class="font-bold text-stone-800">${t.dyn_inv_pali}</p></div>
                        <p class="text-base md:text-lg font-bold text-[#b45309]">${currencyFormatter.format(dataValues[1])}</p>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-white rounded border-l-4 border-[#0369a1]">
                        <div><p class="text-sm text-stone-500">${t.dyn_sav_title}</p><p class="font-bold text-stone-800">${t.dyn_sav_pali}</p></div>
                        <p class="text-base md:text-lg font-bold text-[#0369a1]">${currencyFormatter.format(dataValues[2])}</p>
                    </div>
                `;

                if (budgetChart) {
                    budgetChart.data.labels = t.chart_labels;
                    budgetChart.data.datasets[0].data = dataValues;
                    budgetChart.update();
                } else {
                    budgetChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: t.chart_labels,
                            datasets: [{
                                data: dataValues,
                                backgroundColor: ['#14b8a6', '#b45309', '#0ea5e9'],
                                borderWidth: 2, borderColor: '#ffffff', hoverOffset: 4
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom', labels: { font: { family: 'sans-serif', size: 12 }, color: '#292524' } },
                                tooltip: { callbacks: { label: function(c) { let l = c.label || ''; if(l)l+=': '; if(c.parsed!==null)l+=currencyFormatter.format(c.parsed); return l; } } }
                            },
                            cutout: '65%'
                        }
                    });
                }
            }

            incomeInput.addEventListener('input', (e) => {
                e.stopPropagation(); // Protect input field from ad hijack
                updateBudget();
            });

            // --- Interactive Tabs Logic ---
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation(); // Protect tab buttons from ad hijack
                    e.stopImmediatePropagation();
                    
                    tabBtns.forEach(b => {
                        b.classList.remove('active');
                        b.classList.add('text-stone-600', 'border-stone-300');
                    });
                    tabContents.forEach(c => c.classList.remove('active'));

                    btn.classList.remove('text-stone-600', 'border-stone-300');
                    btn.classList.add('active');

                    const targetId = btn.getAttribute('data-target');
                    document.getElementById(targetId).classList.add('active');
                });
            });

            // Initialize Page
            applyLanguage();
        });
    </script>
